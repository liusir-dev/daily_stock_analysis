name: 每日股票分析

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖（含缺失的tenacity）
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt tenacity

      - name: 运行股票分析脚本
        run: python main.py
